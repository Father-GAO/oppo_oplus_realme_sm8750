name: 加速版构建 6.6.89 欧加真OKI内核

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  KERNEL_NAME: 'android15-8-g29d86c5fc9dd-abogki428889875-4k'
  CCACHE_KEY: 'ccache-neov4-6.6.89'

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU分支(ReSukiSU/SukiSU Ultra/KernelSU Next/KSU(原版)/无内置KSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      susfs_enable:
        description: '是否开启susfs(用于增强隐藏环境挂载功能；可能轻微增加耗电，上游更新导致不稳定时可关闭)'
        required: true
        type: boolean
        default: 'true'
      kpm_enable:
        description: '是否开启kpm(builtin-使用(re)sukisu内置kpm, kpn-使用独立kpm实现(支持任意KSU/面板))'
        required: true
        type: choice
        default: 'builtin'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y ccache git-core clang llvm lld gcc-aarch64-linux-gnu \
            bc bison flex libssl-dev libelf-dev python3-pip
          pip3 install pycryptodome

      - name: Restore CCACHE Cache
        id: ccache-restore
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ${{ env.CCACHE_KEY }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-

      - name: Initialize CCACHE
        run: |
          ccache -M 40G
          ccache -o compression=true
          ccache -s

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 --branch=6.6.89 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8750.git kernel
          cd kernel && echo "Kernel version: $(make kernelversion)" && cd ..

      - name: Apply KSU & KPM Patches
        run: |
          cd kernel
          KSU_TYPE="${{ github.event.inputs.ksu_type }}"
          KPM_ENABLE="${{ github.event.inputs.kpm_enable }}"

          if [ "$KSU_TYPE" != "none" ]; then
            if [ "$KSU_TYPE" = "resukisu" ]; then
              git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git KernelSU
            elif [ "$KSU_TYPE" = "sukisu" ]; then
              git clone --depth=1 https://github.com/SukiSU/SukiSU-Ultra.git KernelSU
            elif [ "$KSU_TYPE" = "ksunext" ]; then
              git clone --depth=1 https://github.com/next-kernelsu/KernelSU.git KernelSU
            else
              git clone --depth=1 https://github.com/tiann/KernelSU.git KernelSU
            fi

            # 应用 KSU 补丁
            patch -p1 < KernelSU/patches/6.6.89/ksu.patch

            # 应用 KPM 补丁
            if [ "$KPM_ENABLE" = "builtin" ]; then
              patch -p1 < KernelSU/patches/6.6.89/kpm.patch
              # 强制启用 KPM 配置
              scripts/config --enable CONFIG_KPM
              scripts/config --set-str KPM_VERSION "1.0.0"
              echo "#define KPM_VERSION \"1.0.0\"" > include/linux/kpm_version.h
            elif [ "$KPM_ENABLE" = "kpn" ]; then
              patch -p1 < KernelSU/patches/6.6.89/kpn.patch
            fi
          fi
          cd ..

      - name: Compile Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LLVM=1
          export CCACHE_PREFIX=ccache
          make -j$(nproc) Image.gz dtbo.img

      - name: Package Kernel (AnyKernel3)
        run: |
          mkdir -p AnyKernel3
          cp kernel/arch/arm64/boot/Image.gz AnyKernel3/
          cp kernel/arch/arm64/boot/dtbo.img AnyKernel3/
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3-Template
          cp -r AnyKernel3-Template/* AnyKernel3/
          rm -rf AnyKernel3-Template

          # 用 printf 生成脚本，彻底避免 EOF 缩进问题
          SCRIPT_FILE="AnyKernel3/META-INF/com/google/android/updater-script"
          mkdir -p $(dirname "$SCRIPT_FILE")
          printf 'ui_print("Flashing 6.6.89 欧加真OKI Kernel");\n' > "$SCRIPT_FILE"
          printf 'ui_print("Android: %s");\n' "${{ env.ANDROID_VERSION }}" >> "$SCRIPT_FILE"
          printf 'ui_print("KSU: %s");\n' "${{ github.event.inputs.ksu_type }}" >> "$SCRIPT_FILE"
          printf 'ui_print("KPM: %s");\n' "${{ github.event.inputs.kpm_enable }}" >> "$SCRIPT_FILE"
          printf 'package_extract_file("Image.gz", "/dev/block/bootdevice/by-name/boot");\n' >> "$SCRIPT_FILE"
          printf 'package_extract_file("dtbo.img", "/dev/block/bootdevice/by-name/dtbo");\n' >> "$SCRIPT_FILE"
          printf 'ui_print("Flash completed!");\n' >> "$SCRIPT_FILE"

          # 打包
          ZIP_NAME="Ace5_Ultra_6.6.89_${{ github.event.inputs.ksu_type }}_KPM_${{ github.event.inputs.kpm_enable }}.zip"
          cd AnyKernel3 && zip -r9 "../$ZIP_NAME" . -x "*.git*" "*.md" "LICENSE"
          cd .. && ls -lh "$ZIP_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ace5_Ultra_Kernel
          path: Ace5_Ultra_*.zip
          retention-days: 7

      - name: Save CCACHE Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /home/runner/.ccache
          key: ${{ steps.ccache-restore.outputs.cache-primary-key || env.CCACHE_KEY }}
