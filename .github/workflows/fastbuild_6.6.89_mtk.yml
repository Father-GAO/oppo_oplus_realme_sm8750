name: (天玑特供)加速版构建 6.6.89 欧加真OKI内核

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  KERNEL_NAME: 'android15-8-g29d86c5fc9dd-abogki428889875-4k'
  CCACHE_KEY: 'ccache-neov4-mtk_6.6.89'

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU分支(ReSukiSU/SukiSU Ultra/KernelSU Next/KSU(原版)/无内置KSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      susfs_enable:
        description: '是否开启susfs(用于增强隐藏环境挂载功能；可能轻微增加耗电，上游更新导致不稳定时可关闭)'
        required: true
        type: boolean
        default: true
      kpm_enable:
        description: '是否开启kpm(builtin-使用(re)sukisu内置kpm, kpn-使用独立kpm实现(支持任意KSU/面板))'
        required: true
        type: choice
        default: 'builtin'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'

jobs:
  build_kernel_mtk:
    name: Build_MTK_6.6.89
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 安装 MTK 核心依赖 (修复包缺失问题)
        run: |
          sudo apt update -y
          sudo apt install -y --no-install-recommends \
            ccache git-core clang llvm lld gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            bc bison flex libssl-dev libelf-dev python3-pip zip unzip \
            libc6-dev-i386 ncurses-dev
          pip3 install pycryptodome --break-system-packages

      - name: 3. 恢复 CCACHE 缓存
        id: ccache-restore
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ${{ env.CCACHE_KEY }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-

      - name: 4. 初始化 CCACHE
        run: |
          ccache -M 50G
          ccache -o compression=true
          ccache -z
          ccache -s

      - name: 5. 克隆 MTK 6.6.89 内核源码 (直接使用仓库根目录)
        run: |
          YOUR_REAL_KERNEL_REPO_URL="https://github.com/Father-GAO/oppo_oplus_realme_sm8750.git"
          # 直接克隆到 kernel 目录，不再自动扫描
          git clone --depth=1 "$YOUR_REAL_KERNEL_REPO_URL" kernel
          # 进入内核目录并检测版本
          cd kernel
          echo "✅ 当前内核版本: $(make kernelversion || echo '未检测到版本，请检查目录结构')"
          cd ..

      - name: 6. 应用 KSU / SUSFS / KPM 补丁 (兼容补丁版本)
        run: |
          cd kernel
          KSU_TYPE="${{ github.event.inputs.ksu_type }}"
          SUSFS_ENABLE="${{ github.event.inputs.susfs_enable }}"
          KPM_ENABLE="${{ github.event.inputs.kpm_enable }}"
          # 优先使用 6.6 系列通用补丁，兼容 6.6.89
          KERNEL_VER="6.6"

          if [ "$KSU_TYPE" != "none" ]; then
            case $KSU_TYPE in
              resukisu) git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git KernelSU ;;
              sukisu) git clone --depth=1 https://github.com/SukiSU/SukiSU-Ultra.git KernelSU ;;
              ksunext) git clone --depth=1 https://github.com/next-kernelsu/KernelSU.git KernelSU ;;
              ksu) git clone --depth=1 https://github.com/tiann/KernelSU.git KernelSU ;;
            esac

            # 尝试 6.6.89 -> 6.6 -> 6.6.x 的补丁回退逻辑
            if [ -f "KernelSU/patches/6.6.89/ksu.patch" ]; then
              PATCH_VER="6.6.89"
            elif [ -f "KernelSU/patches/6.6/ksu.patch" ]; then
              PATCH_VER="6.6"
            else
              echo "⚠️ 未找到 6.6.x 系列 KSU 补丁，跳过 KSU 集成"
              KSU_TYPE="none"
            fi

            if [ "$KSU_TYPE" != "none" ]; then
              patch -p1 < "KernelSU/patches/$PATCH_VER/ksu.patch"
              echo "✅ 已应用 $KSU_TYPE 补丁 (版本: $PATCH_VER)"

              if [ "$KPM_ENABLE" != "false" ]; then
                if [ -f "KernelSU/patches/$PATCH_VER/${KPM_ENABLE}.patch" ]; then
                  patch -p1 < "KernelSU/patches/$PATCH_VER/${KPM_ENABLE}.patch"
                  scripts/config --enable CONFIG_KPM
                  scripts/config --set-str KPM_VERSION "1.0.0"
                  echo -e "#ifndef KPM_VERSION_H\n#define KPM_VERSION \"1.0.0\"\n#endif" > include/linux/kpm_version.h
                  echo "✅ 已开启 KPM: $KPM_ENABLE 模式 (版本: $PATCH_VER)"
                else
                  echo "⚠️ 未找到 $KPM_ENABLE 对应的 KPM 补丁，跳过"
                fi
              fi
            fi
          fi

          if [ "$SUSFS_ENABLE" = "true" ]; then
            if [ -d "../patches/susfs" ]; then
              for patch in ../patches/susfs/*.patch; do
                patch -p1 < "$patch"
              done
              echo "✅ 已开启 SUSFS 功能"
            else
              echo "⚠️ 未找到 SUSFS 补丁目录，跳过"
            fi
          fi

          make savedefconfig
          cd ..

      - name: 7. 编译 MTK 内核 (天玑平台优化)
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LLVM=1
          export LLVM_IAS=1
          export CCACHE_PREFIX=ccache
          make -j$(nproc) Image.gz dtbo.img
          ls -lh arch/arm64/boot/Image.gz arch/arm64/boot/dtbo.img
          cd ..

      - name: 8. 打包 AnyKernel3 (彻底无语法错误)
        run: |
          mkdir -p AnyKernel3
          cp kernel/arch/arm64/boot/Image.gz AnyKernel3/
          cp kernel/arch/arm64/boot/dtbo.img AnyKernel3/
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3-Template
          cp -r AnyKernel3-Template/* AnyKernel3/
          rm -rf AnyKernel3-Template

          SCRIPT="AnyKernel3/META-INF/com/google/android/updater-script"
          mkdir -p $(dirname "$SCRIPT")
          printf 'ui_print("=== 天玑特供 6.6.89 OKI 内核 ===");\n' > "$SCRIPT"
          printf 'ui_print("KSU: %s");\n' "${{ github.event.inputs.ksu_type }}" >> "$SCRIPT"
          printf 'ui_print("SUSFS: %s");\n' "${{ github.event.inputs.susfs_enable }}" >> "$SCRIPT"
          printf 'ui_print("KPM: %s");\n' "${{ github.event.inputs.kpm_enable }}" >> "$SCRIPT"
          printf 'package_extract_file("Image.gz", "/dev/block/bootdevice/by-name/boot");\n' >> "$SCRIPT"
          printf 'package_extract_file("dtbo.img", "/dev/block/bootdevice/by-name/dtbo");\n' >> "$SCRIPT"
          printf 'ui_print("✅ 刷入成功，请重启设备!");\n' >> "$SCRIPT"

          ZIP_NAME="MTK_SM8750_6.6.89_${{ github.event.inputs.ksu_type }}_KPM-${{ github.event.inputs.kpm_enable }}.zip"
          cd AnyKernel3 && zip -r9 "../$ZIP_NAME" . -x "*.git*" "*.md" "LICENSE"
          cd .. && ls -lh "$ZIP_NAME"

      - name: 9. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: MTK_6.6.89_Kernel
          path: MTK_SM8750_*.zip
          retention-days: 7

      - name: 10. 保存 CCACHE 缓存
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /home/runner/.ccache
          key: ${{ steps.ccache-restore.outputs.cache-primary-key || env.CCACHE_KEY }}
